id = "nanos-world-lua"
name = "Nanos World Lua"
description = "Plug-and-play nanos world Lua API support for Zed (LuaLS + bundled annotations)."
version = "0.2.1"
schema_version = 1
authors = ["Khalil Bellil <khalilbellil@gmail.com>"]
repository = "https://github.com/khalilbellil/nanos-zed"

# This extension contributes:
#   1. A dedicated language server `nanos-world-lua` that wraps
#      `lua-language-server` and automatically injects the bundled
#      nanos world annotations as `Lua.workspace.library` — no settings
#      changes required on the user side.
#   2. A small set of Lua snippets for common nanos world idioms.
#
# The community `lua` Zed extension is required for the Lua tree-sitter
# grammar. After installing both, add the one-line language-servers override
# shown in the README to disable the default `LuaLS` in favor of ours.

snippets = ["./snippets/lua.json"]

[language_servers.nanos-world-lua]
name = "nanos world LuaLS"
languages = ["Lua"]
